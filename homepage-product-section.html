<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SarvamSai - Product Section</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles-base.css?v=86">
  <link rel="stylesheet" href="/styles-more.css?v=86">
</head>
<body>
  <section id="product">
    <span class="eyebrow" style="justify-content:center;">The Collectible Discovery Box</span>
    <div
      data-ss-box-canvas
      data-scene-id="easter-scene"
      data-box-id="easter-box"
      data-scene-role="button"
      data-box-role="button"
      data-scene-tab-index="0"
      data-box-tab-index="0"
      data-scene-aria="Open Aaradhana Day poster preview"
      data-box-aria="Reveal Aaradhana Day poster"
      data-scene-on-click="if(window.ssEasterOpen){window.ssEasterOpen();}"
      data-box-on-click="if(window.ssEasterOpen){window.ssEasterOpen();}"
    ></div>
      
  </section>

  <script src="components/box-canvas.js?v=2"></script>
</body>
</html>
