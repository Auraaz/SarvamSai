<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SarvamSai Private Store</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/webp" href="/centenary-emblem.webp">
  <link rel="icon" type="image/png" href="/centenary-emblem.png">
  <link rel="shortcut icon" type="image/png" href="/centenary-emblem.png">
  <link rel="apple-touch-icon" href="/centenary-emblem.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles-base.css?v=85">
  <link rel="stylesheet" href="/styles-more.css?v=85">
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f2e8;
      color: #23180e;
    }
    .boot {
      max-width: 680px;
      margin: 2rem auto;
      padding: 1rem;
      border: 1px solid #d8c7a4;
      background: #fffdf7;
    }
  </style>
</head>
<body>
  <section id="product">
    <span class="eyebrow" style="justify-content:center;">The Collectible Discovery Box</span>
    <div
      data-ss-box-canvas
      data-scene-id="easter-scene"
      data-box-id="easter-box"
      data-scene-role="button"
      data-box-role="button"
      data-scene-tab-index="0"
      data-box-tab-index="0"
      data-scene-aria="Open Aaradhana Day poster preview"
      data-box-aria="Reveal Aaradhana Day poster"
      data-scene-on-click="if(window.ssEasterOpen){window.ssEasterOpen();}"
      data-box-on-click="if(window.ssEasterOpen){window.ssEasterOpen();}"
    ></div>
  </section>
  <main class="boot" id="storeBootStatus">Loading private store...</main>
  <noscript>
    <main class="boot">Please enable JavaScript to access the private store.</main>
  </noscript>
  <script>
    const statusEl = document.getElementById("storeBootStatus");
    function showBootError(message) {
      if (!statusEl) return;
      statusEl.innerHTML = `
        <h1>Store loading issue</h1>
        <p>${message}</p>
        <p>Please reload or open this page directly from the official store URL.</p>
      `;
    }
  </script>
  <script src="/config/launch-global.js?v=11" onerror="showBootError('Unable to load launch config script.')"></script>
  <script src="/components/box-canvas.js?v=2" onerror="showBootError('Unable to load box canvas component.')"></script>
  <script src="/launch-system.js?v=33" onerror="showBootError('Unable to load launch system script.')"></script>
  <script>
    setTimeout(function () {
      if (!window.__SARVAMSAI_LAUNCH_BOOTED) {
        showBootError("Launch system did not initialize.");
      }
    }, 500);
  </script>
</body>
</html>
