# Deploys the repo root to Cloudflare Pages (static + /functions).
#
# GitHub → Settings → Secrets and variables → Actions
#   Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   Variables (optional): CLOUDFLARE_PAGES_PROJECT_NAME — must match the Pages project in Cloudflare.
#
# If deploy fails: confirm token has Account → Cloudflare Pages → Edit; project name matches
# (defaults to lowercase of repo name, e.g. SarvamSai → sarvamsai).
# gitHubToken is intentionally omitted — it only adds GitHub Deployments UI and often causes
# permission errors; Cloudflare deploy does not need it.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Pages project name
        id: pages
        env:
          PAGES_NAME_OVERRIDE: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          if [ -n "$PAGES_NAME_OVERRIDE" ]; then
            echo "project_name=$PAGES_NAME_OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "Using Cloudflare Pages project: $PAGES_NAME_OVERRIDE"
          else
            LOWER="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
            echo "project_name=$LOWER" >> "$GITHUB_OUTPUT"
            echo "Using lowercase repo name as Pages project: $LOWER (set var CLOUDFLARE_PAGES_PROJECT_NAME if different)."
          fi

      - name: Deploy
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin minor to avoid surprise breakages on latest 4.x
          wranglerVersion: "4.81.0"
          command: pages deploy . --project-name=${{ steps.pages.outputs.project_name }}
